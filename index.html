<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anti-Gravity Racing Game</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div id="ui">
      <div id="hud-top">
        <div id="lap-timer">Lap: 00:00.00</div>
      </div>
      <div id="hud-bottom">
        <div id="speedometer">0<span class="unit"> KM/H</span></div>
        <div id="nitro-bar">
          <div id="nitro-fill"></div>
        </div>
      </div>
      <div id="loading">Loading Models...</div>
      <div id="car-selector-container">
        <h3>Select Your Vehicle</h3>
        <div id="car-selector">
          <button data-model="porsche_911_turbo_s.glb">Porsche 911 Turbo S</button>
          <button data-model="lamborghini_centenario_roadster_sdc.glb">Lamborghini Centenario</button>
          <button data-model="2014_mclaren_p1_gtr_concept.glb">McLaren P1 GTR</button>
          <button data-model="toyotagr_supra_gt300__www.vecarz.com.glb">Toyota GT300 Supra</button>
          <button data-model="porsche_gt3_rs.glb">Porsche GT3 RS</button>
        </div>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
